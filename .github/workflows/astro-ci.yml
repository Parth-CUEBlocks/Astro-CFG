name: Astro Branch Build & Track

# This makes the workflow run on ANY branch push
on: [push]

jobs:
  build-and-track:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Tell you exactly what's happening
      - name: 📢 Log Branch Information
        run: |
          echo "🚀 A push event triggered this workflow!"
          echo "🌿 Active Branch: ${{ github.ref_name }}"
          echo "👤 Triggered by: ${{ github.actor }}"

      # Step 2: Bring your code into the runner
      - name: 🚚 Checkout repository code
        uses: actions/checkout@v4

      # Step 3: Setup Node.js environment
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # Speeds up future runs automatically

      # Step 4: Install dependencies
      - name: 📦 Install dependencies
        run: npm ci

      # Step 5: Try to build the Astro project
      - name: 🛠️ Build Astro Site
        run: npm run build

      # Step 6: Log status when things finish
      - name: ✅ Report Success
        if: success()
        run: echo "🎉 Build completed perfectly for branch ${{ github.ref_name }}!"

      - name: ❌ Report Failure
        if: failure()
        run: echo "⚠️ The build failed on branch ${{ github.ref_name }}. Check the logs above!"
